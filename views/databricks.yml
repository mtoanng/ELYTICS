bundle:
  name: HOLMES-VIEWS

sync:
  include:
    - main.py
    - spaces/**

variables:
  notification_recipients:
    description: list of email recipients for job notifications
    type: complex
    default:
      - wrh1tb@bosch.com
      - dmg1tb@bosch.com
  service_principal_id:
    lookup:
      service_principal: "sp-pemely-databricks"
  static_job_cluster_policy_id:
    lookup:
      cluster_policy: "Advanced job cluster without autoscaling"
  catalog:
    description: Unity Catalog to deploy views into
    default: ps_xplatform_dev
  schema:
    description: Schema to deploy views into
    default: pemely_dev
  artifact_location:
    description: Location of bundle artifacts
    default: /Shared/ELY/${bundle.name}

job_settings_create_views: &job_settings_create_views
  permissions:
    - group_name: "idm2bcd_dssi03prod_pemely_data"
      level: "CAN_MANAGE"
  email_notifications:
    on_failure: ${var.notification_recipients}
  job_clusters:
    - job_cluster_key: job_cluster
      new_cluster:
        policy_id: ${var.static_job_cluster_policy_id}
        spark_version: 15.4.x-scala2.12
        node_type_id: Standard_D4a_v4
        num_workers: 1
        azure_attributes:
          availability: "SPOT_WITH_FALLBACK_AZURE"
          first_on_demand: 1
          spot_bid_max_price: -1
        custom_tags:
          product_department_team: "ELY"
  tasks:
    - task_key: tsk_create_views
      job_cluster_key: job_cluster
      spark_python_task:
        python_file: ${workspace.file_path}/main.py
        parameters:
          - --catalog
          - ${var.catalog}
          - --schema
          - ${var.schema}

targets:
  dev:
    mode: production
    workspace:
      host: https://adb-1032635496032522.2.azuredatabricks.net
      root_path: ${var.artifact_location}
    run_as:
      service_principal_name: ${var.service_principal_id}
    resources:
      jobs:
        create_views_job:
          <<: *job_settings_create_views
          name: holmes_views_create_views_dev

  prod:
    mode: production
    workspace:
      host: https://adb-1032635496032522.2.azuredatabricks.net
      root_path: ${var.artifact_location}
    run_as:
      service_principal_name: ${var.service_principal_id}
    resources:
      jobs:
        create_views_job:
          <<: *job_settings_create_views
          name: holmes_views_create_views_prod
