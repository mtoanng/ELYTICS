trigger: none
pr: none

parameters:
  - name: root
    displayName: Root release type
    type: string
    default: none
    values:
      - none
      - patch
      - minor
      - major

  - name: enola
    displayName: Enola release type
    type: string
    default: none
    values:
      - none
      - patch
      - minor
      - major

  - name: mycroft
    displayName: Mycroft release type
    type: string
    default: none
    values:
      - none
      - patch
      - minor
      - major

  - name: sherlock
    displayName: Sherlock release type
    type: string
    default: none
    values:
      - none
      - patch
      - minor
      - major

  - name: watson
    displayName: Watson release type
    type: string
    default: none
    values:
      - none
      - patch
      - minor
      - major

stages:
  - stage: Release
    displayName: Prepare release changelogs and merge develop to main
    jobs:
      - job: ReleaseVersions
        displayName: Bump selected changelog versions
        pool:
          vmImage: ubuntu-latest
        steps:

          - checkout: self
            persistCredentials: true
            fetchDepth: 0
            
          - bash: |
              git config user.email "holmes-release-bot@local"
              git config user.name "HOLMES Release Bot"
            displayName: Configure git user

          - bash: |
              git fetch origin main develop
              git checkout -B main origin/develop
            displayName: Checkout to develop

          - task: UsePythonVersion@0
            inputs:
              versionSpec: '3.12'

          - script: |
              python .azure/release_versions.py \
                --root ${{ parameters.root }} \
                --enola ${{ parameters.enola }} \
                --mycroft ${{ parameters.mycroft }} \
                --sherlock ${{ parameters.sherlock }} \
                --watson ${{ parameters.watson }}
            displayName: Promote unreleased entries to versions

          - bash: |
              if git diff --quiet -- changelog.json frontend/spaces/*/changelog.json; then
                echo "##vso[task.setvariable variable=release_changes]false"
                echo "No changelog version changes detected."
              else
                echo "##vso[task.setvariable variable=release_changes]true"
                echo "Release changes detected."
              fi
            displayName: Detect release changes

          - bash: |
              git add changelog.json frontend/spaces/*/changelog.json
              git commit -m "chore(release): publish versions"
            displayName: Commit release changelog updates
            condition: eq(variables.release_changes, 'true')

          - bash: |
              git push origin develop
            displayName: Push development updates

          - bash: |
              git fetch origin main develop
              git checkout -B main origin/main
              git merge --no-ff origin/develop -m "chore(release): merge develop into main"
            displayName: Merge develop into main

          - bash: |
              set -euo pipefail
              changed=$(git diff --name-only origin/main HEAD -- views/spaces/ || true)
              echo "Changed view files:"
              echo "$changed"
              if [ -n "$changed" ]; then
                echo "##vso[task.setvariable variable=views_changed;isOutput=true]true"
                echo "views_changed=true"
              else
                echo "##vso[task.setvariable variable=views_changed;isOutput=true]false"
                echo "views_changed=false"
              fi
            name: SetViewsChanged
            displayName: Detect view changes for prod deploy

  - stage: Deploy_Views_Prod
    displayName: Deploy views to Prod
    dependsOn: Release
    condition: and(succeeded(), eq(dependencies.Release.outputs['ReleaseVersions.SetViewsChanged.views_changed'], 'true'))
    variables:
      - group: DATABRICKS-VIEWS
    jobs:
      - deployment: DeployViewsProd
        displayName: Deploy Databricks views (Prod)
        environment: prod
        pool:
          vmImage: ubuntu-latest
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                - bash: |
                    curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
                  displayName: Install Databricks CLI
                - bash: |
                    set -euo pipefail
                    cd views
                    export DATABRICKS_HOST="$(DATABRICKS_HOST_PROD)"
                    databricks bundle validate -t prod --var="catalog=ps_xplatform_prod,schema=pemely_prod"
                    databricks bundle deploy  -t prod --var="catalog=ps_xplatform_prod,schema=pemely_prod"
                    databricks bundle run     -t prod create_views_job --var="catalog=ps_xplatform_prod,schema=pemely_prod"
                  displayName: Validate, deploy and run views bundle (Prod)
                  env:
                    ARM_CLIENT_ID: $(ARM_CLIENT_ID)
                    ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
                    ARM_TENANT_ID: $(ARM_TENANT_ID)
                    DATABRICKS_HOST_PROD: $(DATABRICKS_HOST_PROD)
