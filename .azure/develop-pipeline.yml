trigger:
  branches:
    include:
      - develop
  paths:
    include:
      - frontend/**
      - backend/**
    exclude:
      - changelog.json
      - frontend/spaces/*/changelog.json

pr: none

stages:
  - stage: Update_Unreleased_Changelog
    displayName: Update unreleased changelog entries
    jobs:
      - job: UpdateChangelog
        displayName: Detect touched areas and append PR entry
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
            persistCredentials: true
            fetchDepth: 2

          - task: UsePythonVersion@0
            inputs:
              versionSpec: '3.12'

          - script: |
              python - <<'PY'
              import json
              import os
              import sys
              import urllib.error
              import urllib.request

              org_uri = os.getenv("SYSTEM_COLLECTIONURI", "").rstrip("/")
              project = os.getenv("SYSTEM_TEAMPROJECT", "")
              project_id = os.getenv("SYSTEM_TEAMPROJECTID", "")
              repo_id = os.getenv("BUILD_REPOSITORY_ID", "")
              commit_id = os.getenv("BUILD_SOURCEVERSION", "")
              token = os.getenv("SYSTEM_ACCESSTOKEN", "")

              if not all([org_uri, (project_id or project), repo_id, commit_id, token]):
                print("Missing required build variables for PR lookup.")
                sys.exit(0)

              if project_id:
                project_segment = project_id
              else:
                from urllib.parse import quote
                project_segment = quote(project, safe="")

              url = (
                f"{org_uri}/{project_segment}/_apis/git/repositories/{repo_id}"
                f"/commits/{commit_id}/pullRequests?api-version=7.1-preview.1"
              )
              request = urllib.request.Request(url)
              request.add_header("Authorization", f"Bearer {token}")

              try:
                with urllib.request.urlopen(request) as response:
                  data = json.loads(response.read().decode("utf-8"))
              except urllib.error.HTTPError as exc:
                print(f"Failed to query PRs for commit: {exc}")
                sys.exit(0)

              pr_items = data.get("value", [])
              if not pr_items:
                print("No PRs associated with this commit.")
                sys.exit(0)

              pr = pr_items[0]
              pr_id = pr.get("pullRequestId")
              title = (pr.get("title") or "").strip()

              if not pr_id or not title:
                print("PR metadata missing in API response.")
                sys.exit(0)

              print(f"##vso[task.setvariable variable=PR_ID]{pr_id}")
              print(f"##vso[task.setvariable variable=PR_TITLE]{title}")
              PY
            displayName: Resolve PR metadata from merge commit
            env:
              SYSTEM_ACCESSTOKEN: $(System.AccessToken)

          - script: |
              python .azure/update_unreleased.py
            displayName: Update changelog JSON unreleased sections
            env:
              PR_ID: $(PR_ID)
              PR_TITLE: $(PR_TITLE)
              BUILD_SOURCEVERSIONMESSAGE: $(Build.SourceVersionMessage)
              BUILD_SOURCEBRANCH: $(Build.SourceBranch)

          - script: |
              git config user.email "holmes-release-bot@local"
              git config user.name "HOLMES Release Bot"

              git add changelog.json frontend/spaces/*/changelog.json

              if git diff --cached --quiet; then
                echo "No changelog updates to commit."
                exit 0
              fi

              git commit -m "chore(changelog): append unreleased entries [skip ci]"
              git push origin HEAD:develop
            displayName: Commit and push changelog updates
