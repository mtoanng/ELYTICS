name: HOLMES - DEV Pipeline

trigger:
  branches:
    include:
      - develop
  paths:
    include:
      - frontend/**
      - backend/**
      - views/**
    exclude:
      - changelog.json
      - frontend/spaces/*/changelog.json

pr: none

stages:
  - stage: Update_Unreleased_Changelog
    displayName: Update unreleased changelog entries
    jobs:
      - job: UpdateChangelog
        displayName: Detect touched areas and append PR entry
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
            persistCredentials: true
            fetchDepth: 2

          - task: UsePythonVersion@0
            inputs:
              versionSpec: '3.12'

          - script: |
              python .azure/update_unreleased.py
            displayName: Update changelog JSON unreleased sections
            env:
              BUILD_SOURCEVERSIONMESSAGE: $(Build.SourceVersionMessage)
              BUILD_SOURCEBRANCH: $(Build.SourceBranch)

          - script: |
              git config user.email "holmes-release-bot@local"
              git config user.name "HOLMES Release Bot"

              git add changelog.json frontend/spaces/*/changelog.json

              if git diff --cached --quiet; then
                echo "No changelog updates to commit."
                exit 0
              fi

              git commit -m "chore(changelog): append unreleased entries [skip ci]"
              git push origin HEAD:develop
            displayName: Commit and push changelog updates

  - stage: Detect_View_Changes
    displayName: Detect views/spaces changes
    dependsOn: Update_Unreleased_Changelog
    condition: succeeded()
    jobs:
      - job: DetectViewChanges
        displayName: Check for SQL file changes
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
            fetchDepth: 2
          - bash: |
              set -euo pipefail
              changed=$(git diff --name-only HEAD~1 HEAD || true)
              echo "Changed files:"
              echo "$changed"
              if echo "$changed" | grep -qE '^views/spaces/.+\.sql$'; then
                echo "##vso[task.setvariable variable=views_changed;isOutput=true]true"
                echo "views_changed=true"
              else
                echo "##vso[task.setvariable variable=views_changed;isOutput=true]false"
                echo "views_changed=false"
              fi
            name: SetViewsChanged
            displayName: Set views_changed output variable

  - stage: Deploy_Views_Dev
    displayName: Deploy views to Dev
    dependsOn: Detect_View_Changes
    condition: and(succeeded(), eq(stageDependencies.Detect_View_Changes.DetectViewChanges.outputs['SetViewsChanged.views_changed'], 'true'))
    variables:
      - group: HOLMES_SUITE_DEV
    jobs:
      - deployment: DeployViewsDev
        displayName: Deploy Databricks views (Dev)
        environment: dev
        pool:
          vmImage: ubuntu-latest
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                - bash: |
                    curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
                  displayName: Install Databricks CLI
                - bash: |
                    set -euo pipefail
                    cd views
                    export DATABRICKS_HOST="$(DATABRICKS_HOST_DEV)"
                    databricks bundle validate -t dev --var="catalog=ps_xplatform_dev,schema=pemely_dev"
                    databricks bundle deploy  -t dev --var="catalog=ps_xplatform_dev,schema=pemely_dev"
                    databricks bundle run     -t dev create_views_job --var="catalog=ps_xplatform_dev,schema=pemely_dev"
                  displayName: Validate, deploy and run views bundle (Dev)
                  env:
                    ARM_CLIENT_ID: $(ARM_CLIENT_ID)
                    ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
                    ARM_TENANT_ID: $(ARM_TENANT_ID)
                    DATABRICKS_HOST_DEV: $(DATABRICKS_HOST_DEV)