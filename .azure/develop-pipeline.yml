name: HOLMES - DEV Pipeline

trigger:
  branches:
    include:
      - develop
  paths:
    include:
      - frontend/**
      - backend/**
    exclude:
      - changelog.json
      - frontend/spaces/*/changelog.json

pr: none

stages:
  - stage: Update_Unreleased_Changelog
    displayName: Update unreleased changelog entries
    jobs:
      - job: UpdateChangelog
        displayName: Detect touched areas and append PR entry
        pool:
          name: TbP
          vmImage: ubuntu-latest
        steps:
          - checkout: self
            persistCredentials: true
            fetchDepth: 2

          - task: UsePythonVersion@0
            inputs:
              versionSpec: '3.12'

          - script: |
              python .azure/update_unreleased.py
            displayName: Update changelog JSON unreleased sections
            env:
              PR_ID: $(System.PullRequest.PullRequestId)
              PR_TITLE: $(System.PullRequest.Title)
              BUILD_SOURCEVERSIONMESSAGE: $(Build.SourceVersionMessage)
              BUILD_SOURCEBRANCH: $(Build.SourceBranch)

          - script: |
              git config user.email "holmes-release-bot@local"
              git config user.name "HOLMES Release Bot"

              git add changelog.json frontend/spaces/*/changelog.json

              if git diff --cached --quiet; then
                echo "No changelog updates to commit."
                exit 0
              fi

              git commit -m "chore(changelog): append unreleased entries [skip ci]"
              git push origin HEAD:develop
            displayName: Commit and push changelog updates

